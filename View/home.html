<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="../View/src/output.css">
    <link rel="stylesheet" href="../View/Style/h1.css">
</head>

<body>
    <main class=" bg-black text-white">
        <section class="flex-col px-4 py-6 sm:px-6 lg:px-8">
            <div
                class="rounded-3xl bg-black px-4 py-6 shadow-[0_0_0_1px_rgba(255,255,255,0.04),0_24px_80px_rgba(0,0,0,0.65)] sm:px-8 sm:py-8 lg:px-10 lg:py-10">
                <div class="mx-auto max-w-5xl text-center">

                    <div class="relative mt-5 overflow-hidden rounded-[2rem]  bg-black px-3 py-4 sm:px-6 sm:py-6">
                        <div class="pointer-events-none absolute inset-0">
                        </div>
                        <img src="./img/banner.png" alt="HyperCorsaX banner"
                            class="relative z-10 mx-auto w-full max-w-4xl object-contain drop-shadow-[0_22px_35px_rgba(0,0,0,0.8)]" />
                    </div>
                </div>
                <h1 class="mt-10 text-center text-3xl font-black uppercase italic">
                    CATEGORIAS
                </h1>
                <p class="text-center text-1xl font-stretch-extra-condensed text-gray-600">Categorias predefinidas</p>
                <div class="mt-8 grid gap-4 md:grid-cols-3">
                    <a href="../View/graphics.html"
                        class="group block overflow-hidden border-2 border-white bg-black transition-transform duration-300 hover:-translate-y-1 hover:border-[#f4d21f]">
                        <div class="flex aspect-[4/3] items-center justify-center border-b border-white/20 p-4">
                            <img src="../View/img/Formula.png" alt="Formula"
                                class="h-full w-full object-contain transition-transform duration-300 group-hover:scale-105" />
                        </div>
                        <div class="px-4 py-4 text-center">
                            <h2 class="text-xl font-black uppercase tracking-[0.18em] text-white sm:text-2xl">Formula
                            </h2>
                        </div>
                    </a>

                    <a href="../View/graphics.html"
                        class="group block overflow-hidden border-2 border-white bg-black transition-transform duration-300 hover:-translate-y-1 hover:border-[#f4d21f]">
                        <div class="flex aspect-[4/3] items-center justify-center border-b border-white/20 p-4">
                            <img src="../View/img/HyperCar.png" alt="HyperCar"
                                class="h-full w-full object-contain transition-transform duration-300 group-hover:scale-105" />
                        </div>
                        <div class="px-4 py-4 text-center">
                            <h2 class="text-xl font-black uppercase tracking-[0.18em] text-white sm:text-2xl">Hypercar
                            </h2>
                        </div>
                    </a>

                    <a href="#"
                        class="group block overflow-hidden border-2 border-white bg-black transition-transform duration-300 hover:-translate-y-1 hover:border-[#f4d21f]">
                        <div class="flex aspect-[4/3] items-center justify-center border-b border-white/20 p-4">
                            <img src="../View/img/GT.png" alt="GT"
                                class="h-full w-full object-contain transition-transform duration-300 group-hover:scale-105" />
                        </div>
                        <div class="px-4 py-4 text-center">
                            <h2 class="text-xl font-black uppercase tracking-[0.18em] text-white sm:text-2xl">GT</h2>
                        </div>
                    </a>
                </div>
            </div>
        </section>
    </main>

</body>

</html>
